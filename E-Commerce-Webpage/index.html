<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My E-Commerce Store</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#" id="cart-link">Cart (0)</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to Our Store</h2>
        <p>Discover amazing products at unbeatable prices.</p>
    </section>

    <section class="products">
        <div class="product" data-name="Product 1" data-price="19.99">
            <img src="https://via.placeholder.com/200" alt="Product 1">
            <h3>Product 1</h3>
            <p>$19.99</p>
            <button class="add-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Product 2" data-price="29.99">
            <img src="https://via.placeholder.com/200" alt="Product 2">
            <h3>Product 2</h3>
            <p>$29.99</p>
            <button class="add-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Product 3" data-price="39.99">
            <img src="https://via.placeholder.com/200" alt="Product 3">
            <h3>Product 3</h3>
            <p>$39.99</p>
            <button class="add-cart">Add to Cart</button>
        </div>
        <!-- Add more products as needed -->
    </section>

    <footer>
        <p>&copy; 2026 My E-Commerce Store. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
